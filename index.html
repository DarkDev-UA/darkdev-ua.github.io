<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkDev | MIDI Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
  :root {
    --bg: #0a0f1e; --panel: #0e1628; --border: #1a3a6e;
    --accent: #1a5acd; --accent2: #2980ff; --light: #4da3ff;
    --text: #c8deff; --dim: #5a7aaa; --white: #fff;
    --red: #cc2200; --green: #00cc66;
    --mono: 'Share Tech Mono', monospace; --head: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--head); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(26,90,205,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(26,90,205,0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
  
  .container { background: var(--panel); border: 2px solid var(--border); border-radius: 12px; width: 100%; max-width: 500px; padding: 25px; margin-top: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
  .container::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--accent), var(--light), var(--accent)); }
  
  h1 { color: var(--light); text-align: center; margin-bottom: 25px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 15px rgba(77,163,255,0.3); }
  
  .input-group { margin-bottom: 20px; }
  label { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--dim); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  label span { color: var(--light); }
  
  input[type="text"], input[type="file"] { width: 100%; background: #070b14; border: 1px solid var(--border); padding: 12px; color: var(--white); border-radius: 6px; font-family: var(--mono); transition: 0.3s; }
  input[type="text"]:focus { border-color: var(--light); outline: none; box-shadow: 0 0 10px rgba(77,163,255,0.1); }
  
  input[type="range"] { width: 100%; height: 6px; background: #070b14; border-radius: 3px; appearance: none; margin: 10px 0; }
  input[type="range"]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--light); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent); }
  
  .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .checkbox-item { background: #070b14; border: 1px solid var(--border); padding: 10px; border-radius: 6px; display: flex; align-items: center; cursor: pointer; transition: 0.3s; }
  .checkbox-item:hover { border-color: var(--dim); }
  .checkbox-item input { margin-right: 10px; accent-color: var(--light); }
  .checkbox-item span { font-size: 13px; color: var(--text); }

  .btn { width: 100%; background: var(--accent); color: var(--white); border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 700; font-family: var(--head); text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 10px; }
  .btn:hover { background: var(--accent2); box-shadow: 0 0 20px rgba(26,90,205,0.4); transform: translateY(-1px); }
  .btn:active { transform: translateY(1px); }
  
  #resultPanel { margin-top: 25px; display: none; animation: slideIn 0.4s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .stats { background: rgba(26,90,205,0.1); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed var(--border); display: flex; justify-content: space-around; font-family: var(--mono); font-size: 14px; }
  .stats span { color: var(--light); font-weight: bold; }
  
  textarea { width: 100%; height: 200px; background: #05080f; color: var(--light); border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: var(--mono); font-size: 12px; line-height: 1.5; resize: vertical; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="container">
  <h1>DarkDev MIDI</h1>
  
  <div class="input-group">
    <label>MIDI File</label>
    <input type="file" id="midiInput" accept=".mid,.midi">
  </div>

  <div class="input-group">
    <label>Transposition <span id="transVal">0</span></label>
    <input type="range" id="transpose" min="-24" max="24" value="0">
  </div>

  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" id="useNoteLengths" checked><span>Note Lengths</span></label>
    <label class="checkbox-item"><input type="checkbox" id="useSustain"><span>Sustain</span></label>
  </div>

  <div class="input-group">
    <label>Song Name</label>
    <input type="text" id="songName" placeholder="My Song">
  </div>
  
  <div class="input-group">
    <label>Author</label>
    <input type="text" id="songAuthor" placeholder="Unknown">
  </div>

  <button class="btn" id="convertBtn">Convert MIDI</button>

  <div id="resultPanel">
    <div class="stats" id="resultStats"></div>
    <textarea id="codeOutput" readonly></textarea>
    <button class="btn" id="copyBtn" style="background: var(--green);">Copy Lua Code</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28"></script>
<script>
const KEY_MAP = {"C":"1","C#":"!","D":"2","D#":"@","E":"3","F":"4","F#":"$","G":"5","G#":"%","A":"6","A#":"^","B":"7","C2":"8","C#2":"*","D2":"9","D#2":"(","E2":"0","F2":"q","F#2":"Q","G2":"w","G#2":"W","A2":"e","A#2":"E","B2":"r","C3":"R","C#3":"t","D3":"T","D#3":"y","E3":"Y","F3":"u","F#3":"U","G3":"i","G#3":"I","A3":"o","A#3":"O","B3":"p","C4":"P","C#4":"a","D4":"A","D#4":"s","S#4":"S","E4":"d","F4":"D","F#4":"f","G4":"F","G#4":"g","A4":"G","A#4":"h","B4":"H","C5":"j","C#5":"J","D5":"k","D#5":"K","E5":"l","F5":"L","F#5":"z","G5":"Z","G#5":"x","A5":"X","A#5":"c","B5":"C","C6":"v","C#6":"V","D6":"b","D#6":"B","E6":"n","F6":"N","G6":"m","A6":"M"};

const transposeInput = document.getElementById('transpose');
const transValLabel = document.getElementById('transVal');
transposeInput.oninput = () => transValLabel.textContent = transposeInput.value;

function midiToKey(n, trans) {
  const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const note = n + parseInt(trans);
  const oct = Math.floor(note / 12) - 1;
  const name = names[note % 12];
  return KEY_MAP[name + (oct > 1 ? oct : "")] || null;
}

document.getElementById('convertBtn').onclick = async () => {
  const file = document.getElementById('midiInput').files[0];
  if (!file) return alert("Select MIDI file first!");

  const midi = await new Midi(await file.arrayBuffer());
  const trans = transposeInput.value;
  const useNL = document.getElementById('useNoteLengths').checked;
  
  let events = [];
  midi.tracks.forEach(t => t.notes.forEach(n => {
    events.push({s: n.time * 1000, e: (n.time + n.duration) * 1000, k: midiToKey(n.midi, trans)});
  }));
  events.sort((a, b) => a.s - b.s);

  const round10 = v => Math.round(v / 10) * 10;
  let notes = [], totalMs = 0;

  for (let i = 0; i < events.length; i++) {
    const cur = events[i], nxt = events[i+1];
    if (!cur.k) continue;

    const hold = useNL ? round10(cur.e - cur.s) : 80;
    let wait = 0;
    if (nxt) {
      const diff = nxt.s - cur.s;
      wait = diff < 25 ? 0 : round10(diff);
    }
    notes.push(`${cur.k},${hold},${wait}`);
    totalMs += wait;
  }

  const name = document.getElementById('songName').value || "My Song";
  const author = document.getElementById('songAuthor').value || "Unknown";
  
  document.getElementById('codeOutput').value = `{\n    name = "${name}",\n    author = "${author}",\n    icon = "rbxassetid://0",\n    notes = "${notes.join('|')}"\n},`;

  const sec = Math.floor(totalMs / 1000);
  document.getElementById('resultStats').innerHTML = `Notes: <span>${notes.length}</span> | Length: <span>${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}</span>`;
  document.getElementById('resultPanel').style.display = 'block';
};

document.getElementById('copyBtn').onclick = () => {
  document.getElementById('codeOutput').select();
  document.execCommand('copy');
};
</script>
</body>
</html>
