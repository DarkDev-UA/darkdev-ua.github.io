<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkDev | MIDI Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
  :root {
    --bg: #0a0f1e; --panel: #0e1628; --border: #1a3a6e;
    --accent: #1a5acd; --accent2: #2980ff; --light: #4da3ff;
    --text: #c8deff; --dim: #5a7aaa; --white: #fff;
    --red: #cc2200; --green: #00cc66;
    --mono: 'Share Tech Mono', monospace; --head: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--head); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(26,90,205,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(26,90,205,0.07) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; width: 100%; max-width: 820px; padding: 20px 16px 60px; }
  header { text-align: center; padding: 36px 0 28px; border-bottom: 2px solid var(--border); margin-bottom: 28px; }
  header h1 { font-family: var(--head); font-size: 2.8rem; font-weight: 700; color: var(--white); letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 30px rgba(41,128,255,0.5); }
  header h1 span { color: var(--accent2); }
  header p { font-family: var(--mono); font-size: 0.8rem; color: var(--dim); margin-top: 8px; letter-spacing: 2px; }
  .panel { background: var(--panel); border: 2px solid var(--border); padding: 20px; margin-bottom: 16px; position: relative; }
  .panel-title { font-family: var(--mono); font-size: 0.72rem; color: var(--accent2); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .drop-zone { border: 2px dashed var(--border); padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent2); background: rgba(41,128,255,0.05); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  .drop-zone h3 { font-size: 1.1rem; font-weight: 700; color: var(--white); }
  .drop-zone p { font-family: var(--mono); font-size: 0.75rem; color: var(--dim); margin-top: 6px; }
  .file-loaded { font-family: var(--mono); font-size: 0.8rem; color: var(--green); margin-top: 10px; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 500px) { .settings-grid { grid-template-columns: 1fr; } }
  .setting-item label { display: block; font-family: var(--mono); font-size: 0.72rem; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .setting-item input[type=text], .setting-item input[type=number] { width: 100%; background: var(--bg); border: 2px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.85rem; padding: 8px 10px; outline: none; }
  .setting-item input:focus { border-color: var(--accent2); }
  .range-wrap { display: flex; align-items: center; gap: 10px; }
  .range-wrap input[type=range] { flex: 1; padding: 0; height: 4px; accent-color: var(--accent2); cursor: pointer; }
  .range-val { font-family: var(--mono); font-size: 0.85rem; color: var(--accent2); min-width: 40px; text-align: right; }
  /* Чекбоксы */
  .checks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 12px; border: 2px solid var(--border); background: var(--bg); transition: border-color 0.15s; }
  .check-item:hover { border-color: var(--accent2); }
  .check-item.active { border-color: var(--accent2); background: rgba(41,128,255,0.08); }
  .check-item input[type=checkbox] { accent-color: var(--accent2); width: 16px; height: 16px; cursor: pointer; }
  .check-item span { font-family: var(--mono); font-size: 0.78rem; color: var(--text); }
  .check-item small { display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--dim); margin-top: 2px; }
  /* Кнопки */
  .btn-convert { width: 100%; padding: 16px; background: var(--accent); border: 2px solid var(--accent2); color: var(--white); font-family: var(--head); font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; margin-bottom: 16px; }
  .btn-convert:hover { background: var(--accent2); box-shadow: 0 0 20px rgba(41,128,255,0.4); }
  .btn-convert:disabled { background: #111827; border-color: var(--border); color: var(--dim); cursor: not-allowed; }
  /* Прослушивание */
  .preview-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .btn-play { padding: 10px 20px; background: var(--accent); border: 2px solid var(--accent2); color: var(--white); font-family: var(--head); font-size: 1rem; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-play:hover { background: var(--accent2); }
  .btn-play.stop { background: var(--red); border-color: #ff4422; }
  .progress-bar { flex: 1; background: var(--bg); border: 2px solid var(--border); height: 12px; position: relative; cursor: pointer; }
  .progress-fill { height: 100%; background: var(--accent2); width: 0%; transition: width 0.1s; }
  .time-label { font-family: var(--mono); font-size: 0.75rem; color: var(--dim); min-width: 50px; text-align: right; }
  /* Результат */
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .result-stats { font-family: var(--mono); font-size: 0.75rem; color: var(--dim); }
  .result-stats span { color: var(--accent2); }
  .btn-copy { background: var(--bg); border: 2px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.75rem; padding: 6px 14px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .btn-copy:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }
  .code-output { background: #060a12; border: 2px solid var(--border); padding: 16px; font-family: var(--mono); font-size: 0.78rem; color: #7ec8ff; max-height: 380px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.6; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .status { font-family: var(--mono); font-size: 0.78rem; padding: 10px 14px; border-left: 3px solid var(--dim); background: rgba(255,255,255,0.02); margin-bottom: 12px; display: none; }
  .status.ok { border-color: var(--green); color: var(--green); }
  .status.err { border-color: var(--red); color: #ff6655; }
  .status.info { border-color: var(--accent2); color: var(--light); }
  .bpm-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
  .bpm-detected { font-family: var(--mono); font-size: 0.8rem; color: var(--accent2); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Dark<span>Dev</span> | MIDI Converter</h1>
    <p>// MIDI → LUA · VIRTUAL PIANO ROBLOX</p>
  </header>

  <!-- 01 Загрузка -->
  <div class="panel">
    <div class="panel-title">01 // загрузка файла</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".mid,.midi">
      <span class="drop-icon">🎵</span>
      <h3>Перетащи MIDI файл сюда</h3>
      <p>или нажми чтобы выбрать (.mid / .midi)</p>
      <div class="file-loaded" id="fileLoaded"></div>
    </div>
  </div>

  <!-- 02 Настройки -->
  <div class="panel">
    <div class="panel-title">02 // настройки</div>
    <div class="settings-grid" style="margin-bottom:14px;">
      <div class="setting-item">
        <label>Название песни</label>
        <input type="text" id="songName" placeholder="My Song">
      </div>
      <div class="setting-item">
        <label>Автор</label>
        <input type="text" id="songAuthor" placeholder="Unknown">
      </div>
      <div class="setting-item">
        <label>Транспонирование (полутонов)</label>
        <div class="range-wrap">
          <input type="range" id="transpose" min="-12" max="12" value="0">
          <span class="range-val" id="transposeVal">0</span>
        </div>
      </div>
      <div class="setting-item">
        <label>Скорость (x)</label>
        <div class="range-wrap">
          <input type="range" id="speed" min="0.25" max="3" step="0.05" value="1">
          <span class="range-val" id="speedVal">1.00x</span>
        </div>
      </div>
      <div class="setting-item">
        <label>BPM <span id="bpmDetected" class="bpm-detected"></span></label>
        <div class="range-wrap">
          <input type="number" id="bpmInput" placeholder="авто" min="20" max="300" style="width:100%">
        </div>
      </div>
    </div>

    <!-- Опции -->
    <div class="checks-grid">
      <label class="check-item" id="chkNoteLengths">
        <input type="checkbox" id="useNoteLengths" checked>
        <div>
          <span>Длина нот из MIDI</span>
          <small>Hold = реальная длина ноты</small>
        </div>
      </label>
      <label class="check-item" id="chkDetectBpm">
        <input type="checkbox" id="detectBpm" checked>
        <div>
          <span>Определить BPM</span>
          <small>Автоматически из MIDI</small>
        </div>
      </label>
    </div>
  </div>

  <!-- Прослушивание -->
  <div class="panel" id="previewPanel" style="display:none;">
    <div class="panel-title">02.5 // прослушивание</div>
    <div class="preview-row">
      <button class="btn-play" id="playBtn">▶ Play</button>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="previewFill"></div>
      </div>
      <span class="time-label" id="previewTime">0:00</span>
    </div>
    <div style="font-family:var(--mono);font-size:0.72rem;color:var(--dim);">Синтезированный звук — для проверки мелодии</div>
  </div>

  <!-- Кнопка конвертации -->
  <button class="btn-convert" id="convertBtn" disabled>⚡ Конвертировать в Lua</button>

  <!-- Статус -->
  <div class="status" id="status"></div>

  <!-- Результат -->
  <div class="panel" id="resultPanel" style="display:none;">
    <div class="panel-title">03 // результат</div>
    <div class="result-header">
      <div class="result-stats" id="resultStats"></div>
      <button class="btn-copy" id="copyBtn">Копировать</button>
    </div>
    <div class="code-output" id="codeOutput"></div>
  </div>
</div>

<script>
// =============================================
//   РАСКЛАДКА НОТ
// =============================================
const NOTE_MAP = {
  36:'1',37:'2',38:'3',39:'5',40:'4',41:'6',42:'7',43:'8',44:'!',45:'9',46:'@',47:'0',
  48:'q',49:'Q',50:'w',51:'W',52:'e',53:'E',54:'r',55:'T',56:'t',57:'Y',58:'y',59:'u',
  60:'i',61:'I',62:'o',63:'O',64:'p',65:'P',66:'a',67:'A',68:'s',69:'S',70:'d',71:'D',
  72:'g',73:'G',74:'h',75:'H',76:'j',77:'J',78:'k',79:'L',80:'l',81:'Z',82:'z',83:'x',
  84:'X',85:'c',86:'C',87:'v',88:'V',89:'b',90:'B',91:'n',92:'N',93:'m',94:'u',95:'U',
};

function midiNoteToKey(note, transpose) {
  let n = note + transpose;
  while (n < 36) n += 12;
  while (n > 95) n -= 12;
  return NOTE_MAP[n] || null;
}

function midiToFreq(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

// =============================================
//   ПАРСЕР MIDI
// =============================================
function parseMidi(buffer) {
  const data = new DataView(buffer);
  let pos = 0;
  const readU32 = () => { const v = data.getUint32(pos); pos += 4; return v; };
  const readU16 = () => { const v = data.getUint16(pos); pos += 2; return v; };
  const readU8  = () => data.getUint8(pos++);
  const readVar = () => {
    let r = 0, b;
    do { b = readU8(); r = (r << 7) | (b & 0x7f); } while (b & 0x80);
    return r;
  };

  if (readU32() !== 0x4D546864) throw new Error('Не MIDI файл');
  readU32();
  const format = readU16(), numTracks = readU16(), tpb = readU16();
  const tracks = [];

  for (let t = 0; t < numTracks; t++) {
    if (readU32() !== 0x4D54726B) throw new Error('Плохой трек');
    const trackEnd = pos + readU32();
    const events = [];
    let tick = 0, lastStatus = 0;

    while (pos < trackEnd) {
      tick += readVar();
      let sb = readU8();
      if (sb & 0x80) lastStatus = sb; else { pos--; sb = lastStatus; }
      const typ = sb >> 4;

      if (typ === 0x9) {
        const n = readU8(), v = readU8();
        events.push({ tick, type: v > 0 ? 'noteOn' : 'noteOff', note: n, vel: v });
      } else if (typ === 0x8) {
        const n = readU8(); readU8();
        events.push({ tick, type: 'noteOff', note: n });
      } else if (typ === 0xb) {
        const ctrl = readU8(), val = readU8();
        if (ctrl === 64) events.push({ tick, type: 'sustain', val });
      } else if (typ === 0xa || typ === 0xe) { readU8(); readU8(); }
        else if (typ === 0xc || typ === 0xd) { readU8(); }
        else if (sb === 0xff) {
          const mt = readU8(), ml = readVar();
          if (mt === 0x51 && ml === 3) {
            const b1=readU8(),b2=readU8(),b3=readU8();
            events.push({ tick, type: 'tempo', tempo: (b1<<16)|(b2<<8)|b3 });
          } else pos += ml;
        } else if (sb === 0xf0 || sb === 0xf7) { pos += readVar(); }
    }
    pos = trackEnd;
    tracks.push(events);
  }
  return { format, numTracks, tpb, tracks };
}

// =============================================
//   TEMPO MAP
// =============================================
function buildTempoMap(midi) {
  const all = [];
  for (const t of midi.tracks) for (const e of t) all.push(e);
  all.sort((a,b) => a.tick - b.tick);
  const map = [{ tick: 0, tempo: 500000 }];
  for (const e of all) if (e.type === 'tempo') map.push({ tick: e.tick, tempo: e.tempo });
  return map;
}

function tickToMs(tick, tpb, tempoMap, speedMul) {
  let ms = 0, lastTick = 0, lastTempo = 500000;
  for (const tm of tempoMap) {
    if (tm.tick >= tick) break;
    const t = Math.min(tm.tick, tick);
    ms += ((t - lastTick) / tpb) * (lastTempo / 1000);
    lastTick = tm.tick; lastTempo = tm.tempo;
  }
  ms += ((tick - lastTick) / tpb) * (lastTempo / 1000);
  return ms / speedMul;
}

function detectBpmFromMap(tempoMap) {
  if (tempoMap.length < 2) return Math.round(60000000 / tempoMap[0].tempo);
  // Берём самый частый темп
  const counts = {};
  for (const tm of tempoMap) {
    const bpm = Math.round(60000000 / tm.tempo);
    counts[bpm] = (counts[bpm] || 0) + 1;
  }
  return parseInt(Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0]);
}

// =============================================
//   КОНВЕРТАЦИЯ
// =============================================
function convertToNotes(midi, transpose, speedMul, useNoteLengths) {
  const tempoMap = buildTempoMap(midi);
  const tpb = midi.tpb;
  const FIXED_HOLD = 80;
  const SIMUL_THRESHOLD = 30;

  const allEvents = [];
  for (const t of midi.tracks) for (const e of t) allEvents.push(e);
  allEvents.sort((a,b) => a.tick - b.tick);

  const noteOnMap = {};
  const segments = [];

  for (const ev of allEvents) {
    if (ev.type === 'noteOn') {
      const key = midiNoteToKey(ev.note, transpose);
      if (key) noteOnMap[ev.note] = { startMs: tickToMs(ev.tick, tpb, tempoMap, speedMul), key, vel: ev.vel };
    } else if (ev.type === 'noteOff') {
      if (noteOnMap[ev.note]) {
        const endMs = tickToMs(ev.tick, tpb, tempoMap, speedMul);
        const d = noteOnMap[ev.note];
        segments.push({
          startMs: d.startMs,
          endMs,
          key: d.key,
          vel: d.vel,
          holdMs: useNoteLengths ? Math.max(10, Math.round(endMs - d.startMs)) : FIXED_HOLD
        });
        delete noteOnMap[ev.note];
      }
    }
  }
  for (const [, d] of Object.entries(noteOnMap)) {
    segments.push({ startMs: d.startMs, endMs: d.startMs + FIXED_HOLD, key: d.key, vel: d.vel, holdMs: FIXED_HOLD });
  }

  segments.sort((a,b) => a.startMs - b.startMs);

  const notes = [];
  for (let i = 0; i < segments.length; i++) {
    const cur = segments[i];
    const nxt = segments[i+1];
    let pauseMs = 0;
    if (nxt) {
      const diff = nxt.startMs - cur.startMs;
      pauseMs = diff < SIMUL_THRESHOLD ? 0 : Math.max(0, Math.round(diff - cur.holdMs));
    }
    notes.push({ key: cur.key, hold: cur.holdMs, pause: pauseMs, vel: cur.vel });
  }
  return notes;
}

// =============================================
//   ГЕНЕРАЦИЯ LUA
// =============================================
function generateLua(notes, name, author) {
  const safe = s => s.replace(/"/g, '\\"');
  const noteStr = notes.map(n => `${n.key},${n.hold},${n.pause}`).join('|');
  return [
    `-- Вставь этот блок в таблицу Songs в DarkDevHub_v4.lua`,
    `{`,
    `    name = "${safe(name || 'My Song')}",`,
    `    author = "${safe(author || 'Unknown')}",`,
    `    icon = "rbxassetid://0",`,
    `    notes = "${noteStr}"`,
    `},`
  ].join('\n');
}

// =============================================
//   ПРОСЛУШИВАНИЕ
// =============================================
let audioCtx = null;
let playbackNodes = [];
let isPlaying = false;
let animFrame = null;
let playbackStart = 0;
let playbackDuration = 0;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function stopPlayback() {
  isPlaying = false;
  for (const n of playbackNodes) { try { n.stop(); } catch(e){} }
  playbackNodes = [];
  if (animFrame) cancelAnimationFrame(animFrame);
  playBtn.textContent = '▶ Play';
  playBtn.classList.remove('stop');
}

function buildPlaybackEvents(midi, transpose, speedMul) {
  const tempoMap = buildTempoMap(midi);
  const tpb = midi.tpb;
  const allEvents = [];
  for (const t of midi.tracks) for (const e of t) allEvents.push(e);
  allEvents.sort((a,b) => a.tick - b.tick);
  const noteOnMap = {};
  const events = [];
  for (const ev of allEvents) {
    if (ev.type === 'noteOn' && ev.vel > 0) {
      noteOnMap[ev.note] = { startMs: tickToMs(ev.tick, tpb, tempoMap, speedMul), vel: ev.vel };
    } else if (ev.type === 'noteOff' || (ev.type === 'noteOn' && ev.vel === 0)) {
      if (noteOnMap[ev.note]) {
        const endMs = tickToMs(ev.tick, tpb, tempoMap, speedMul);
        const freq = midiToFreq(ev.note + transpose);
        if (freq > 20 && freq < 20000) {
          events.push({ startSec: noteOnMap[ev.note].startMs/1000, durSec: Math.max(0.05,(endMs - noteOnMap[ev.note].startMs)/1000), freq, vel: noteOnMap[ev.note].vel });
        }
        delete noteOnMap[ev.note];
      }
    }
  }
  events.sort((a,b) => a.startSec - b.startSec);
  return events;
}

function startPlayback(events) {
  ensureAudioCtx();
  stopPlayback();
  if (!events.length) return;
  isPlaying = true;
  playBtn.textContent = '■ Stop';
  playBtn.classList.add('stop');
  playbackStart = audioCtx.currentTime + 0.05;
  playbackDuration = events[events.length-1].startSec + events[events.length-1].durSec + 0.5;

  for (const ev of events) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    osc.type = 'triangle';
    osc.frequency.value = ev.freq;
    filt.type = 'lowpass';
    filt.frequency.value = 4000;
    const vol = (ev.vel / 127) * 0.15;
    const t0 = playbackStart + ev.startSec;
    const dur = Math.min(ev.durSec, 2.0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.008);
    gain.gain.exponentialRampToValueAtTime(vol * 0.3, t0 + dur * 0.4);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(filt); filt.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
    playbackNodes.push(osc);
  }

  const tick = () => {
    if (!isPlaying) return;
    const elapsed = audioCtx.currentTime - playbackStart;
    const prog = Math.min(elapsed / playbackDuration, 1);
    previewFill.style.width = (prog * 100) + '%';
    const s = Math.floor(elapsed);
    previewTime.textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
    if (prog >= 1) { stopPlayback(); previewFill.style.width='0%'; previewTime.textContent='0:00'; return; }
    animFrame = requestAnimationFrame(tick);
  };
  animFrame = requestAnimationFrame(tick);
}

// =============================================
//   UI
// =============================================
let parsedMidi = null;

const fileInput    = document.getElementById('fileInput');
const dropZone     = document.getElementById('dropZone');
const fileLoaded   = document.getElementById('fileLoaded');
const convertBtn   = document.getElementById('convertBtn');
const resultPanel  = document.getElementById('resultPanel');
const codeOutput   = document.getElementById('codeOutput');
const copyBtn      = document.getElementById('copyBtn');
const statusEl     = document.getElementById('status');
const resultStats  = document.getElementById('resultStats');
const previewPanel = document.getElementById('previewPanel');
const playBtn      = document.getElementById('playBtn');
const previewFill  = document.getElementById('previewFill');
const previewTime  = document.getElementById('previewTime');
const transposeSlider = document.getElementById('transpose');
const transposeVal = document.getElementById('transposeVal');
const speedSlider  = document.getElementById('speed');
const speedVal     = document.getElementById('speedVal');
const bpmInput     = document.getElementById('bpmInput');
const bpmDetected  = document.getElementById('bpmDetected');
const useNoteLengthsCb = document.getElementById('useNoteLengths');
const detectBpmCb  = document.getElementById('detectBpm');

transposeSlider.addEventListener('input', () => transposeVal.textContent = transposeSlider.value);
speedSlider.addEventListener('input', () => speedVal.textContent = parseFloat(speedSlider.value).toFixed(2) + 'x');

// Подсветка чекбоксов
document.querySelectorAll('.check-item').forEach(el => {
  const cb = el.querySelector('input[type=checkbox]');
  const update = () => el.classList.toggle('active', cb.checked);
  cb.addEventListener('change', update);
  update();
});

detectBpmCb.addEventListener('change', () => {
  bpmInput.disabled = detectBpmCb.checked;
  if (detectBpmCb.checked && parsedMidi) {
    const map = buildTempoMap(parsedMidi);
    const bpm = detectBpmFromMap(map);
    bpmDetected.textContent = `→ ${bpm} BPM`;
  }
});

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
  statusEl.style.display = 'block';
}

function loadFile(file) {
  if (!file || !file.name.match(/\.midi?$/i)) {
    showStatus('Ошибка: нужен .mid или .midi файл', 'err');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      parsedMidi = parseMidi(e.target.result);
      fileLoaded.textContent = `✓ ${file.name} · ${parsedMidi.numTracks} треков`;
      convertBtn.disabled = false;
      previewPanel.style.display = 'block';

      // Detect BPM
      if (detectBpmCb.checked) {
        const map = buildTempoMap(parsedMidi);
        const bpm = detectBpmFromMap(map);
        bpmDetected.textContent = `→ ${bpm} BPM`;
      }

      showStatus(`MIDI загружен · ${parsedMidi.numTracks} треков · ${parsedMidi.tpb} ticks/beat`, 'ok');
    } catch(err) {
      showStatus('Ошибка: ' + err.message, 'err');
    }
  };
  reader.readAsArrayBuffer(file);
}

fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });

// Play button — инициализируем AudioContext сразу при клике (решает блокировку браузера)
playBtn.addEventListener('click', () => {
  if (isPlaying) { stopPlayback(); return; }
  if (!parsedMidi) return;
  ensureAudioCtx();
  const transpose = parseInt(transposeSlider.value);
  const speed = parseFloat(speedSlider.value);
  const events = buildPlaybackEvents(parsedMidi, transpose, speed);
  startPlayback(events);
});

convertBtn.addEventListener('click', () => {
  if (!parsedMidi) return;
  try {
    const transpose = parseInt(transposeSlider.value);
    const speed = parseFloat(speedSlider.value);
    const useNL = useNoteLengthsCb.checked;
    const name = document.getElementById('songName').value || 'My Song';
    const author = document.getElementById('songAuthor').value || 'Unknown';

    showStatus('Конвертирую...', 'info');
    const notes = convertToNotes(parsedMidi, transpose, speed, useNL);

    if (!notes.length) { showStatus('Ноты не найдены. Попробуй изменить транспонирование.', 'err'); return; }

    const lua = generateLua(notes, name, author);
    codeOutput.textContent = lua;

    const totalSec = notes.reduce((s,n) => s + (n.hold + n.pause) / 1000, 0);
    const mins = Math.floor(totalSec/60), secs = Math.floor(totalSec%60);
    resultStats.innerHTML = `Нот: <span>${notes.length}</span> · Длина: <span>${mins}:${String(secs).padStart(2,'0')}</span>`;
    resultPanel.style.display = 'block';
    resultPanel.scrollIntoView({ behavior: 'smooth' });
    showStatus(`Готово! ${notes.length} нот конвертировано.`, 'ok');
  } catch(err) {
    showStatus('Ошибка: ' + err.message, 'err');
  }
});

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(codeOutput.textContent).then(() => {
    copyBtn.textContent = 'Скопировано!';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = 'Копировать'; copyBtn.classList.remove('copied'); }, 2000);
  });
});
</script>
</body>
</html>
