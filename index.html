<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkDev | MIDI Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
  :root {
    --bg: #0a0f1e; --panel: #0e1628; --border: #1a3a6e;
    --accent: #1a5acd; --accent2: #2980ff; --light: #4da3ff;
    --text: #c8deff; --dim: #5a7aaa; --white: #fff;
    --red: #cc2200; --green: #00cc66;
    --mono: 'Share Tech Mono', monospace; --head: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--head); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .container { background: var(--panel); border: 2px solid var(--border); border-radius: 12px; width: 100%; max-width: 500px; padding: 20px; margin-top: 40px; }
  h1 { color: var(--light); text-align: center; margin-bottom: 20px; }
  .input-group { margin-bottom: 15px; }
  label { display: block; margin-bottom: 5px; color: var(--dim); font-size: 14px; }
  input[type="text"], input[type="file"] { width: 100%; background: #070b14; border: 1px solid var(--border); padding: 10px; color: var(--white); border-radius: 6px; }
  .btn { width: 100%; background: var(--accent); color: var(--white); border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  #resultPanel { margin-top: 20px; display: none; }
  textarea { width: 100%; height: 150px; background: #05080f; color: var(--light); border: 1px solid var(--border); padding: 10px; font-family: var(--mono); font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>

<div class="container">
  <h1>DarkDev MIDI</h1>
  <div class="input-group">
    <label>MIDI File:</label>
    <input type="file" id="midiInput" accept=".mid,.midi">
  </div>
  <div class="input-group">
    <label>Song Name:</label>
    <input type="text" id="songName" placeholder="My Song">
  </div>
  <div class="input-group">
    <label>Author:</label>
    <input type="text" id="songAuthor" placeholder="Unknown">
  </div>
  <button class="btn" id="convertBtn">Convert</button>

  <div id="resultPanel">
    <div id="resultStats" style="text-align:center; margin-bottom:10px;"></div>
    <textarea id="codeOutput" readonly></textarea>
    <button class="btn" id="copyBtn" style="background: var(--green);">Copy Lua</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28"></script>
<script>
const KEY_MAP = {"C":"1","C#":"!","D":"2","D#":"@","E":"3","F":"4","F#":"$","G":"5","G#":"%","A":"6","A#":"^","B":"7","C2":"8","C#2":"*","D2":"9","D#2":"(","E2":"0","F2":"q","F#2":"Q","G2":"w","G#2":"W","A2":"e","A#2":"E","B2":"r","C3":"R","C#3":"t","D3":"T","D#3":"y","E3":"Y","F3":"u","F#3":"U","G3":"i","G#3":"I","A3":"o","A#3":"O","B3":"p","C4":"P","C#4":"a","D4":"A","D#4":"s","S#4":"S","E4":"d","F4":"D","F#4":"f","G4":"F","G#4":"g","A4":"G","A#4":"h","B4":"H","C5":"j","C#5":"J","D5":"k","D#5":"K","E5":"l","F5":"L","F#5":"z","G5":"Z","G#5":"x","A5":"X","A#5":"c","B5":"C","C6":"v","C#6":"V","D6":"b","D#6":"B","E6":"n","F6":"N","G6":"m","A6":"M"};

function midiToKey(n) {
  const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const oct = Math.floor(n / 12) - 1;
  const name = names[n % 12];
  return KEY_MAP[name + (oct > 1 ? oct : "")] || null;
}

document.getElementById('convertBtn').onclick = async () => {
  const file = document.getElementById('midiInput').files[0];
  if (!file) return;

  const midi = await new Midi(await file.arrayBuffer());
  let events = [];
  midi.tracks.forEach(t => t.notes.forEach(n => {
    events.push({s: n.time * 1000, e: (n.time + n.duration) * 1000, k: midiToKey(n.midi)});
  }));
  events.sort((a, b) => a.s - b.s);

  const round10 = v => Math.round(v / 10) * 10;
  let notes = [];
  let totalMs = 0;

  for (let i = 0; i < events.length; i++) {
    const cur = events[i], nxt = events[i+1];
    if (!cur.k) continue;

    const hold = round10(cur.e - cur.s);
    let wait = 0;
    if (nxt) {
      const diff = nxt.s - cur.s;
      wait = diff < 25 ? 0 : round10(diff); 
    }
    notes.push(`${cur.k},${hold},${wait}`);
    totalMs += wait;
  }

  const name = document.getElementById('songName').value || "My Song";
  const author = document.getElementById('songAuthor').value || "Unknown";
  
  document.getElementById('codeOutput').value = `{\n    name = "${name}",\n    author = "${author}",\n    icon = "rbxassetid://0",\n    notes = "${notes.join('|')}"\n},`;

  const sec = Math.floor(totalMs / 1000);
  document.getElementById('resultStats').innerHTML = `Notes: ${notes.length} | Time: ${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
  document.getElementById('resultPanel').style.display = 'block';
};

document.getElementById('copyBtn').onclick = () => {
  document.getElementById('codeOutput').select();
  document.execCommand('copy');
};
</script>
</body>
</html>
